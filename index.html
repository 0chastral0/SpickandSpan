<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Spick & Span">

  <!-- Android / generic PWA -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="application-name" content="Spick & Span">
  <meta name="theme-color" content="#2563eb">

  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">

  <title>Spick & Span</title>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #f8fbff;
    }
    iframe {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
    /* Splash while iframe loads */
    .splash {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: linear-gradient(180deg, #f8fbff 0%, #eef4ff 100%);
      transition: opacity 0.4s;
      z-index: 1;
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
    }
    .splash.hidden { opacity: 0; pointer-events: none; }
    .splash .logo-img {
      width: 160px;
      height: auto;
      filter: drop-shadow(0 8px 24px rgba(37, 99, 235, 0.18));
    }
    .splash .dot {
      width: 6px; height: 6px; border-radius: 50%; background: #2563eb;
      animation: pulse 1.2s infinite ease-in-out;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(0.6); opacity: 0.4; }
      50%      { transform: scale(1);   opacity: 1;   }
    }
  </style>
</head>
<body>
  <div class="splash" id="splash">
    <img class="logo-img" src="logo.png" alt="Spick & Span">
    <div class="dot"></div>
  </div>

  <iframe
    id="appFrame"
    src="https://script.google.com/macros/s/AKfycbzPSGCW1zmm61yg5pbI5-VlSFwDcv-Zqfq68IHMGV7OPC69UBe9CsjFqPE4pz-gbV9HcA/exec"
    sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals allow-downloads allow-top-navigation-by-user-activation"
    allow="fullscreen; clipboard-read; clipboard-write; camera"
    loading="eager"
    onload="document.getElementById('splash').classList.add('hidden')">
  </iframe>

  <script>
    // Lock history so iOS back-swipe never escapes the shell
    history.pushState(null, '', window.location.href);
    window.addEventListener('popstate', function () {
      history.pushState(null, '', window.location.href);
    });
    // Safety: hide splash after 6s in case onload doesn't fire
    setTimeout(function () {
      document.getElementById('splash').classList.add('hidden');
    }, 6000);
  </script>
</body>
</html>
